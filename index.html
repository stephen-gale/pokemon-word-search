<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Word Search</title>
  <meta name="theme-color" content="#d64933">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>Pokemon Word Search</h1>
      <div class="topbar-actions">
        <button id="menu-button" class="menu-button icon-menu-button" type="button" aria-label="Open menu" aria-haspopup="dialog" aria-controls="menu-overlay" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <main class="layout">
      <section class="panel board-panel" aria-label="Word search puzzle">
        <div id="board" class="board" aria-label="Word search board"></div>
      </section>

      <aside class="panel sidebar" aria-label="Found Pokemon">
        <div id="found-list" class="found-grid"></div>
      </aside>
    </main>
  </div>

  <div id="menu-overlay" class="overlay" hidden>
    <div class="overlay-backdrop" data-close-menu="true"></div>
    <section class="menu-dialog" role="dialog" aria-modal="true" aria-labelledby="menu-title">
      <div class="menu-header">
        <h2 id="menu-title">Menu</h2>
        <button id="close-menu-button" class="icon-button" type="button" aria-label="Close menu">Close</button>
      </div>

      <div class="menu-section">
        <span class="menu-label">Rounds completed</span>
        <strong id="rounds-completed">0</strong>
      </div>

      <label class="toggle-row" for="cries-toggle">
        <span>Mute cries</span>
        <input id="cries-toggle" type="checkbox">
      </label>

      <label class="toggle-row" for="music-toggle">
        <span>Mute music</span>
        <input id="music-toggle" type="checkbox">
      </label>

      <div class="menu-actions">
        <button id="new-round-button" class="primary-button" type="button">New Round</button>
        <button id="reset-button" class="secondary-button" type="button">Reset</button>
      </div>
    </section>
  </div>

  <div id="completion-overlay" class="overlay completion-overlay" hidden>
    <div class="overlay-backdrop overlay-backdrop-solid"></div>
    <section class="completion-dialog" role="status" aria-live="polite" aria-labelledby="completion-title">
      <div class="confetti confetti-left" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="confetti confetti-right" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>
      <p class="eyebrow">Round complete</p>
      <h2 id="completion-title">All 4 Pokemon found</h2>
      <p id="completion-rounds-text">Rounds completed: 0</p>
      <button id="completion-new-round-button" class="primary-button completion-button" type="button">Next Round</button>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
